<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>實價登錄查詢系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 500: "#6366f1", 600: "#4f46e5", 700: "#4338ca" }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
    .input-field {
      @apply w-full border rounded-lg px-3 py-2 text-sm
             focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500;
      /* 淺色模式：白底灰字 */
      background-color: #ffffff;
      border-color: #d1d5db;
      color: #374151;
    }
    .input-field::placeholder { color: #9ca3af; }
    .input-field option {
      background-color: #ffffff;
      color: #374151;
    }
    /* 深色模式：黑底灰字 */
    @media (prefers-color-scheme: dark) {
      .input-field {
        background-color: #030712;
        border-color: #374151;
        color: #9ca3af;
      }
      .input-field::placeholder { color: #6b7280; }
      .input-field option {
        background-color: #030712;
        color: #9ca3af;
      }
    }
    /* 篩選區標籤 */
    #filter-body label { color: #4b5563; }
    @media (prefers-color-scheme: dark) {
      #filter-body label { color: #9ca3af; }
    }
    .btn-primary {
      @apply bg-brand-600 hover:bg-brand-700 text-white font-medium px-4 py-2 rounded-lg
             text-sm transition-colors duration-150 cursor-pointer;
    }
    .btn-ghost {
      @apply bg-gray-700 hover:bg-gray-600 text-gray-300 font-medium px-4 py-2 rounded-lg
             text-sm transition-colors duration-150 cursor-pointer;
    }
    th { user-select: none; }
    th:hover { color: #a5b4fc; }
    .sort-asc::after  { content: ' ▲'; font-size: 0.65rem; }
    .sort-desc::after { content: ' ▼'; font-size: 0.65rem; }
    #studio-panel {
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    #studio-panel.open { transform: translateX(0); }
    .tag-a { @apply bg-indigo-900 text-indigo-300 text-xs px-2 py-0.5 rounded-full; }
    .tag-b { @apply bg-purple-900 text-purple-300 text-xs px-2 py-0.5 rounded-full; }

    #filter-body {
      overflow: hidden;
      max-height: 320px;
      padding-bottom: 16px;
      transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1), padding-bottom 0.2s ease;
    }
    #filter-body.collapsed {
      max-height: 0;
      padding-bottom: 0;
    }
    #filter-chevron {
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    #filter-chevron.collapsed {
      transform: rotate(-90deg);
    }
    .export-dropdown { position: relative; }
    .export-menu {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      min-width: 120px;
      z-index: 50;
      overflow: hidden;
    }
    .export-menu.open { display: block; }
    .export-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 14px;
      font-size: 0.75rem;
      color: #d1d5db;
      background: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .export-menu button:hover { background: #374151; color: #fff; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">實</div>
      <h1 class="text-lg font-semibold text-white">實價登錄查詢系統</h1>
    </div>
    <div class="text-xs text-gray-500" id="last-update">載入中…</div>
  </header>

  <!-- Dashboard -->
  <div class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex-shrink-0">
    <div class="flex flex-wrap gap-4 items-start">
      <div class="flex gap-3 flex-shrink-0">
        <div class="bg-gray-800 rounded-lg px-4 py-3 min-w-[110px]">
          <div class="text-xs text-gray-400 mb-1">資料總筆數</div>
          <div class="text-lg font-bold text-white leading-tight" id="dash-total">—</div>
        </div>
      </div>
      <div class="flex-1 min-w-[260px]">
        <div class="text-xs text-gray-500 mb-2">建物型態分佈</div>
        <div id="dash-building-types" class="space-y-1.5"></div>
      </div>
    </div>
  </div>

  <!-- Filter Panel -->
  <div class="bg-gray-900 border-b border-gray-800 flex-shrink-0">
    <div id="filter-toggle" class="px-6 py-3 flex items-center justify-between cursor-pointer hover:bg-gray-800/40 transition-colors select-none">
      <div class="flex items-center gap-2.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
        </svg>
        <span class="text-sm font-medium text-gray-200">篩選條件</span>
        <span id="filter-badge" class="hidden bg-brand-600 text-white text-xs px-1.5 py-0.5 rounded-full min-w-[20px] text-center leading-tight">0</span>
      </div>
      <svg id="filter-chevron" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </div>

    <div id="filter-body" class="px-6">
      <!-- Row 1: main filters -->
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 items-end">
        <div>
          <label class="block text-xs font-medium mb-1">鄉鎮市區</label>
          <select id="f-district" class="input-field">
            <option value="">全部</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">建物型態</label>
          <select id="f-building-type" class="input-field">
            <option value="">全部</option>
          </select>
        </div>
        <div class="sm:col-span-1 md:col-span-1 lg:col-span-2">
          <label class="block text-xs font-medium mb-1">社區案名</label>
          <input id="f-community" type="text" placeholder="模糊搜尋" class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">民國年</label>
          <input id="f-year" type="number" placeholder="例：112" class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">月份</label>
          <input id="f-month" type="number" min="1" max="12" placeholder="1–12" class="input-field" />
        </div>
      </div>

      <!-- Row 2: range filters + buttons -->
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 items-end mt-3 pt-3 border-t border-gray-800">
        <div>
          <label class="block text-xs font-medium mb-1">總價最小（元）</label>
          <input id="f-min-price" type="number" placeholder="最小" class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">總價最大（元）</label>
          <input id="f-max-price" type="number" placeholder="最大" class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">單價最小（元/㎡）</label>
          <input id="f-min-unit" type="number" placeholder="最小" class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">單價最大（元/㎡）</label>
          <input id="f-max-unit" type="number" placeholder="最大" class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">房數</label>
          <input id="f-bedrooms" type="number" min="0" placeholder="任意" class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium mb-1">衛數</label>
          <input id="f-bathrooms" type="number" min="0" placeholder="任意" class="input-field" />
        </div>
      </div>

      <!-- Buttons row -->
      <div class="flex gap-2 mt-3">
        <button id="btn-search" class="btn-primary px-6">查詢</button>
        <button id="btn-clear" class="btn-ghost px-6">清除</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">

    <!-- Stats Bar -->
    <div class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-3 text-sm text-gray-400">
        共找到 <span id="total-count" class="text-white font-semibold">—</span> 筆資料
        <span class="text-gray-700">｜</span>
        <div class="flex items-center gap-1.5">
          <span class="text-xs text-gray-500">每頁顯示</span>
          <select id="page-size" class="bg-gray-800 border border-gray-600 rounded px-2 py-0.5 text-xs text-gray-100 focus:outline-none focus:border-brand-500 cursor-pointer">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <span class="text-xs text-gray-500">筆</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div id="pagination-info" class="text-xs text-gray-500"></div>
        <button id="btn-studio" class="flex items-center gap-1.5 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-300 text-xs px-3 py-1.5 rounded-lg transition-colors duration-150 cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2" />
          </svg>
          欄位設定
        </button>
        <!-- Export dropdown -->
        <div class="export-dropdown">
          <button id="btn-export" class="flex items-center gap-1.5 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-300 text-xs px-3 py-1.5 rounded-lg transition-colors duration-150 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            <span id="btn-export-label">匯出</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <div id="export-menu" class="export-menu">
            <button onclick="exportData('csv')">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
              匯出 CSV
            </button>
            <button onclick="exportData('xlsx')">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
              </svg>
              匯出 XLSX
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="flex-1 overflow-auto px-6 pb-4">
      <div id="loading" class="hidden text-center py-12 text-gray-500 text-sm">載入中…</div>
      <div id="empty" class="hidden text-center py-12 text-gray-500 text-sm">找不到符合條件的資料</div>

      <table class="w-full text-sm border-collapse" id="result-table">
        <thead id="result-head" class="sticky top-0 bg-gray-900 z-10"></thead>
        <tbody id="result-body" class="divide-y divide-gray-800"></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="bg-gray-900 border-t border-gray-800 px-6 py-3 flex items-center justify-between flex-shrink-0">
      <button id="btn-prev" class="btn-ghost text-xs px-3 py-1.5 disabled:opacity-40 disabled:cursor-not-allowed">← 上一頁</button>
      <div id="page-info" class="text-xs text-gray-500"></div>
      <button id="btn-next" class="btn-ghost text-xs px-3 py-1.5 disabled:opacity-40 disabled:cursor-not-allowed">下一頁 →</button>
    </div>

  </main>

  <!-- Studio Overlay -->
  <div id="studio-overlay" class="fixed inset-0 bg-black/60 z-40 hidden"></div>

  <!-- Studio Panel -->
  <div id="studio-panel" class="fixed top-0 right-0 h-full w-72 bg-gray-900 border-l border-gray-700 z-50 flex flex-col">
    <div class="px-5 py-4 border-b border-gray-800 flex items-center justify-between flex-shrink-0">
      <div>
        <h3 class="text-sm font-semibold text-white">欄位設定</h3>
        <p class="text-xs text-gray-500 mt-0.5">選擇要顯示的欄位</p>
      </div>
      <button onclick="closeStudio()" class="text-gray-400 hover:text-white transition-colors cursor-pointer p-1 rounded hover:bg-gray-800">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto px-4 py-4" id="studio-groups"></div>
    <div class="px-5 py-4 border-t border-gray-800 flex gap-2 flex-shrink-0">
      <button onclick="resetColumns()" class="btn-ghost flex-1 text-xs py-1.5">恢復預設</button>
      <button onclick="closeStudio()" class="btn-primary flex-1 text-xs py-1.5">完成</button>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
